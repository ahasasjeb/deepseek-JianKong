name: Android Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager --install "platform-tools" "build-tools;36.0.0"
          sdkmanager --install "platforms;android-36.1" || sdkmanager --install "platforms;android-36"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.4.0"

      - name: Restore debug keystore
        shell: bash
        run: base64 --decode debug.keystore.base64 > debug.keystore

      - name: Run unit tests
        run: gradle testDebugUnitTest

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Rename APK
        shell: bash
        run: |
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk release/deepseek-monitor-${GITHUB_REF_NAME}-${GITHUB_RUN_NUMBER}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: deepseek-monitor-apk
          path: release/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('latest-{0}', github.run_number) }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || 'Latest' }}
          make_latest: true
          files: release/*.apk
          fail_on_unmatched_files: true
          generate_release_notes: true
